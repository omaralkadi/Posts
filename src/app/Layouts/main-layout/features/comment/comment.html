    <!-- 💬 Show comments -->
    <div class="mt-3">
        <button class="text-sm text-blue-600 hover:underline">
            Show Comments
        </button>
    </div>

<div class="mt-3 space-y-3">

    @for (comment of commentList; track comment._id) {
        
        <div class="flex gap-2 items-start">

            <img 
                [src]="comment.commentCreator.photo" 
                class="w-8 h-8 rounded-full object-cover"
            />

            <div>

                <div class="bg-gray-100 px-3 py-2 rounded-2xl text-sm">
                    <span class="font-semibold block">
                        {{ comment.commentCreator.name }}
                    </span>
                    {{ comment.content }}
                </div>

                <span class="text-xs text-gray-500 ml-2">
                {{ comment.createdAt.split('T')[0] }} {{ comment.createdAt.split('T')[1].slice(0,5) }}           
             </span>

            </div>

        </div>

    }

        <form [formGroup]="commentForm" (ngSubmit)="submitComment()">
        <!-- ✍️ Add comment -->
        <div class="mt-4 flex items-center gap-2">
            <input 
                type="text" 
                placeholder="Write a comment..." 
                formControlName="comment"
                class="flex-1 border rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            />

            <button [disabled]="isSubmitting"
            class="text-blue-600 font-medium text-sm disabled:opacity-50 cursor-pointer">

            @if (isSubmitting) {
                Posting...
            } @else {
                Post
            }

            </button>
        </div>

    </form>

</div>
