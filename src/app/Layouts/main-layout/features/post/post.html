<div class="w-full mx-auto bg-white border rounded-2xl p-4 shadow-sm my-4">

    <!-- 🔝 Header -->
    <div class="flex items-center justify-between">
        
        <!-- user info -->
        <div class="flex items-center gap-3">
            <img 
                [src]="post.user.photo" 
                class="w-10 h-10 rounded-full object-cover"
            />

            <div>
                <h3 class="font-semibold text-sm">{{post.user.name}}</h3>
                <p class="text-xs text-gray-500">{{post.createdAt.split('T')[0]}}</p>
            </div>
        </div>

        <!-- dropdown -->
        <div class="relative">
            <button class="text-gray-500 hover:text-black text-xl">⋯</button>
        </div>

    </div>

<!-- 📝 Post text -->
    <div 
    class="mt-4 text-sm text-gray-800 leading-relaxed cursor-pointer"
    [routerLink]="['/main/details', post._id]">

        {{ post.body }}

    </div>

    <!-- 🖼️ Post image -->
    <div class="mt-4">
        <img 
            [src]="post.image" 
            class="w-full rounded-xl object-cover"
        />
    </div>

    <app-comment [PostId]="post._id"></app-comment>
</div>
