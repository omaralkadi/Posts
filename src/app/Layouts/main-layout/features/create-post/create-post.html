<div class="w-full bg-gray-50 flex justify-center">
    <button
        data-modal-target="postModal" 
        data-modal-toggle="postModal"
        class="bg-gray-300 px-4 py-2 rounded-full w-full max-w-md text-left cursor-pointer">
        What are you thinking...
    </button>
</div>


<div id="postModal" tabindex="-1" aria-hidden="true"
  class="hidden fixed inset-0 z-50 flex justify-center items-center bg-black/40">

  <div class="bg-white rounded-lg shadow w-full max-w-md p-4">

    <!-- header -->
    <div class="flex justify-between items-center border-b pb-2">
      <h3 class="text-lg font-semibold cursor-pointer">Create Post</h3>
      <button data-modal-hide="postModal" class="cursor-pointer">✕</button>
    </div>

    <!-- body -->
    <div class="mt-4">

      <textarea
        [(ngModel)]="postContent"
        class="w-full border rounded-lg p-2"
        placeholder="What are you thinking...">
      </textarea>

      <!-- preview -->
      @if (imagePreview) {
        <img [src]="imagePreview" class="mt-3 rounded">
      }

      <input type="file" (change)="onFileSelected($event)" class="mt-3">

    </div>

    <!-- footer -->
    <div class="flex justify-end gap-2 mt-4">
      <button data-modal-hide="postModal" class="bg-gray-200 px-4 py-2 rounded cursor-pointer">
        Cancel
      </button>

        <button 
        (click)="submitPost()"
        [disabled]="isLoading || (!postContent && !selectedFile)"
        class="bg-blue-600 text-white px-4 py-2 rounded disabled:opacity-50 cursor-pointer disabled:cursor-not-allowed">

        @if (isLoading) {
            Posting...
        } @else {
            Post
        }

        </button>
   

    </div>

  </div>
</div>
